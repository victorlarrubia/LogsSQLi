events { worker_connections 1024; }

http {
    log_format dataset_format '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time';

    access_log /var/log/nginx/access.log dataset_format;

    server {
        listen 80;
        location / {
            proxy_pass http://juice-shop:3000;
        }
    }
}